<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackly | Page Not Found</title>
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background-color: var(--color-black);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 2rem;
      color: var(--color-white);
      position: relative;
      overflow: hidden;
    }
    .error-code {
      font-size: clamp(6rem, 15vw, 12rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--color-electric-blue), var(--color-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -0.05em;
    }
    .error-msg {
      font-size: 1.5rem;
      color: var(--text-secondary-light);
      margin-bottom: 3rem;
      max-width: 500px;
    }
    .btn-group {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <div class="gradient-overlay"></div>
  
  <div class="animate-fade-up is-visible" style="z-index: 1;">
    <img src="assets/Brand%20Logo.webp" alt="Stackly Logo" style="height: 40px; margin-bottom: 4rem; filter: brightness(0) invert(1);">
    
    <div class="error-code">404</div>
    <div class="error-msg">The page you're looking for has been moved or doesn't exist.</div>
    
    <div class="btn-group">
      <button onclick="history.back()" class="btn btn-outline" style="color: white; border-color: rgba(255,255,255,0.3);"><i class="fas fa-arrow-left"></i> Go Back</button>
      <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Back to Home</a>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
